name: docs

# The documentation site is a Canon program: `docs/src/main.can` is the
# Elm-architecture web app, and it renders the `docs/src/*.md` pages with
# the standard library's Markdown renderer, compiled to a WebAssembly
# module. The landing page (`docs/landing/`) is served at the site root
# and the app under `/doc/`.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      # The app is compiled by the canon compiler and renders the docs
      # through the stdlib Markdown renderer, so compiler and stdlib
      # changes rebuild the site.
      - "src/**"
      - "packages/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      - "src/**"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build the canon compiler
        run: cargo build --release

      - name: Build the docs app (Canon → WebAssembly)
        run: target/release/canon build docs

      - name: Assemble site (landing at /, docs app under /doc/)
        run: |
          mkdir -p site/doc
          cp -r docs/landing/. site/
          cp -r docs/build/. site/doc/

      - name: Upload artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: deploy
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
