name: release

# Reusable build-and-publish core. It never pushes to main: the version is
# stamped into Cargo.toml at build time (not committed) and the release is
# attached to a tag. Entry points:
#   - nightly.yml  → rolling `nightly` prerelease on every push to main
#   - promote.yml  → manual promotion of a commit to a stable vX.Y.Z release
# Both call this workflow via `workflow_call`. A `workflow_dispatch` trigger is
# kept for manual emergency rebuilds of a specific tag.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref / SHA to build from"
        required: true
        type: string
      tag:
        description: "Release tag to create or update (e.g. v0.3.1 or nightly)"
        required: true
        type: string
      version:
        description: "Version string stamped into Cargo.toml + the binary"
        required: true
        type: string
      prerelease:
        description: "Publish as a prerelease (nightly)"
        required: false
        default: false
        type: boolean
      make_latest:
        description: "Mark this release as the repository's Latest"
        required: false
        default: true
        type: boolean
      move_tag:
        description: "Force-move the tag to `ref` before publishing (rolling tags)"
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref / SHA to build from"
        required: true
      tag:
        description: "Release tag to create or update (e.g. v0.3.1 or nightly)"
        required: true
      version:
        description: "Version string stamped into Cargo.toml + the binary"
        required: true
      prerelease:
        type: boolean
        default: false
      make_latest:
        type: boolean
        default: true
      move_tag:
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          # Cross-compiled on the arm64 macos-14 runner: the Intel macos-13
          # runner is no longer served to this account, so pinning to it left
          # this leg stuck `queued` forever — which blocked the publish job
          # (it needs every build leg) and wedged the auto-release concurrency
          # group, so no release ever published. macOS clang cross-links
          # x86_64 natively and the Build step already passes --target, so no
          # extra linker config is needed.
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            linker: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            apt: musl-tools
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            exe: .exe
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Stamp version
        shell: bash
        run: |
          set -eu
          v="${{ inputs.version }}"
          # Rewrite only the first top-level `version = "..."` (the [package]
          # line, which starts at column 0). awk is available on every runner,
          # including Git bash on Windows, and avoids sed -i portability quirks.
          awk -v v="$v" 'BEGIN{done=0} /^version = "/ && !done {sub(/"[^"]*"/, "\"" v "\""); done=1} {print}' Cargo.toml > Cargo.toml.tmp
          mv Cargo.toml.tmp Cargo.toml
          echo "Building canon $v"

      - name: Install cross-compilation toolchain
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          name="canon-${{ inputs.tag }}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/canon${{ matrix.exe }}" "dist/${name}/"
          cp README.md LICENSE "dist/${name}/" 2>/dev/null || true
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${name}.tar.gz" | awk '{print $1}'
          else
            shasum -a 256 "dist/${name}.tar.gz" | awk '{print $1}'
          fi > "dist/${name}.tar.gz.sha256"
          echo "archive=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha=dist/${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: canon-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.sha }}

  vsix:
    name: package vscode extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Package .vsix
        working-directory: editors/vscode-canon
        run: |
          npm ci
          npx vsce package --no-dependencies

      - uses: actions/upload-artifact@v7
        with:
          name: canon-vsix
          path: editors/vscode-canon/*.vsix

  release:
    name: publish release
    needs: [build, vsix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Move rolling tag
        if: ${{ inputs.move_tag }}
        run: |
          set -eu
          git tag -f "${{ inputs.tag }}" "${{ inputs.ref }}"
          git push -f origin "refs/tags/${{ inputs.tag }}"

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ inputs.ref }}
          name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.make_latest }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.vsix
