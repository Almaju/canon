name: auto-release

# Every push to main cuts a release automatically. If Cargo.toml already
# names an untagged version (a deliberate minor/major bump landed in the
# push), that version is released as-is; otherwise the patch component of
# the current version is bumped, committed back to main, and released.
# The release build is invoked as a reusable workflow (workflow_call)
# rather than relying on the tag push, because tags pushed with
# GITHUB_TOKEN never trigger `on: push: tags` workflows.

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "editors/**"
      - "**.md"

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  tag:
    name: Tag next version
    # Belt and braces: never re-release our own version-bump commit, even
    # if the workflow is ever switched to a PAT (whose pushes DO retrigger).
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        run: |
          set -eu
          cargo_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          if git rev-parse -q --verify "refs/tags/v${cargo_version}" >/dev/null; then
            major="${cargo_version%%.*}"
            rest="${cargo_version#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
            next="${major}.${minor}.$((patch + 1))"
            echo "bump=true" >> "$GITHUB_OUTPUT"
          else
            next="${cargo_version}"
            echo "bump=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${next}" >> "$GITHUB_OUTPUT"
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.version.outputs.bump == 'true'
        run: |
          set -eu
          sed -i 's/^version = ".*"$/version = "${{ steps.version.outputs.version }}"/' Cargo.toml
          cargo update --workspace --quiet
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"
          n=0
          until git push origin HEAD:main; do
            n=$((n + 1))
            [ "$n" -lt 3 ] || exit 1
            git pull --rebase origin main
          done

      - name: Push tag
        run: |
          set -eu
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  release:
    name: Build and publish
    needs: tag
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
