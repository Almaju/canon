name: nightly

# Every push to main publishes a rolling `nightly` prerelease. Nothing is
# pushed back to main — the version is derived from tags and stamped into the
# build in CI — so this never trips the branch ruleset. Because nightlies are
# GitHub *prereleases*, `/releases/latest` (and the stable install channel)
# ignore them; only the nightly channel picks them up.

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "editors/**"
      - "**.md"

permissions:
  contents: write

# A newer push to main supersedes an in-flight nightly — no point finishing an
# already-stale build, and it keeps the group from ever piling up.
concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  prepare:
    name: Compute nightly version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      sha: ${{ steps.v.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute version
        id: v
        run: |
          set -eu
          short="$(git rev-parse --short HEAD)"
          day="$(date -u +%Y%m%d)"
          # Base the nightly on the next patch after the latest stable tag so a
          # nightly always sorts ahead of the last stable. Fall back to the
          # Cargo.toml version when no stable release exists yet.
          stable="$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [ -n "$stable" ]; then
            base="${stable#v}"
            major="${base%%.*}"; rest="${base#*.}"; minor="${rest%%.*}"; patch="${rest#*.}"
            base="${major}.${minor}.$((patch + 1))"
          else
            base="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          fi
          # `g` prefix keeps the sha identifier alphanumeric (a purely numeric
          # identifier with a leading zero is invalid semver).
          echo "version=${base}-nightly.${day}.g${short}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release:
    name: Build and publish nightly
    needs: prepare
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}
      tag: nightly
      version: ${{ needs.prepare.outputs.version }}
      prerelease: true
      make_latest: false
      move_tag: true
