name: promote

# Manually promote a commit (by default the current `nightly` build) to a
# stable vX.Y.Z release. This is the "push nightly to stable" button: run it
# from Actions → promote → Run workflow. Like nightly.yml it never pushes to
# main — it computes the next version from the vX.Y.Z tags, creates that tag on
# the chosen commit, and publishes a normal (non-prerelease) release, which
# then becomes the repository's Latest and the stable install channel's target.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Which part of the version to bump"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      ref:
        description: "Commit / ref to promote (defaults to the latest nightly)"
        required: false
        default: nightly

permissions:
  contents: write

jobs:
  prepare:
    name: Resolve version and commit
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      sha: ${{ steps.v.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next stable version
        id: v
        run: |
          set -eu
          ref="${{ inputs.ref }}"
          sha="$(git rev-parse --verify "${ref}^{commit}")"
          latest="$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [ -n "$latest" ]; then
            base="${latest#v}"
          else
            base="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          fi
          major="${base%%.*}"; rest="${base#*.}"; minor="${rest%%.*}"; patch="${rest#*.}"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="${major}.${minor}.${patch}"
          if git rev-parse -q --verify "refs/tags/v${next}" >/dev/null; then
            echo "error: tag v${next} already exists" >&2
            exit 1
          fi
          echo "version=${next}" >> "$GITHUB_OUTPUT"
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Promoting ${sha} to v${next}"

  release:
    name: Build and publish stable
    needs: prepare
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}
      tag: ${{ needs.prepare.outputs.tag }}
      version: ${{ needs.prepare.outputs.version }}
      prerelease: false
      make_latest: true
      move_tag: false
