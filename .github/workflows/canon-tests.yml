name: canon-tests

on:
  push:
    branches: [main]
    paths:
      - "packages/canon/std/**"
      - "tests/canon/**"
      - "src/**"
      - "justfile"
      - ".github/workflows/canon-tests.yml"
  pull_request:
    paths:
      - "packages/canon/std/**"
      - "tests/canon/**"
      - "src/**"
      - "justfile"
      - ".github/workflows/canon-tests.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  canon-tests:
    name: canon-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v3

      - name: test-can
        run: just test-can
