name: Feature Request
description: Suggest a language feature, standard library addition, or tooling improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check [DESIGN.md](../blob/main/DESIGN.md) — the feature may already be specified but not yet implemented.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Language (syntax / semantics)
        - Standard library
        - Compiler / tooling
        - Documentation
        - Editor support
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe what you are trying to do and what is currently blocking you.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketched syntax or examples are welcome.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about and why you ruled them out.
