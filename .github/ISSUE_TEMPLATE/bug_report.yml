name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest `.can` snippet that reproduces the bug.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include any error output or unexpected compiler output.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Canon version
      placeholder: "e.g. 0.2.0  (run `canon --version`)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (arm64)
        - macOS (x86_64)
        - Linux (x86_64)
        - Linux (arm64)
        - Windows
        - Other
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: How did you install Canon?
      options:
        - install.sh (prebuilt binary)
        - Built from source
    validations:
      required: true
