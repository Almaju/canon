<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Canon</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a0a'/%3E%3Ctext x='16' y='22' font-family='ui-monospace,Menlo,monospace' font-size='17' font-weight='700' fill='%23e8a24b' text-anchor='middle'%3E*%3C/text%3E%3C/svg%3E">
<script>
  // The book moved from the site root to /doc/. If an old book URL lands
  // here, forward it to the same path under /doc/ before painting anything.
  (function () {
    var path = location.pathname;
    var base = path.indexOf("/canon/") === 0 ? "/canon/" : "/";
    var rest = path.slice(base.length);
    if (rest && rest.indexOf("doc/") !== 0) {
      location.replace(base + "doc/" + rest + location.search + location.hash);
    }
  })();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #ededed;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }
  main { padding: 24px; }
  .code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    color: #e8a24b;
    letter-spacing: .14em;
  }
  h1 {
    margin-top: 14px;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 650;
    letter-spacing: -.03em;
  }
  p { margin-top: 12px; color: #a1a1aa; font-size: 15.5px; }
  .row { margin-top: 28px; display: flex; gap: 12px; justify-content: center; }
  a {
    display: inline-flex;
    font-size: 14.5px;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 8px;
    text-decoration: none;
    transition: background .15s, border-color .15s;
  }
  .primary { background: #ededed; color: #0a0a0a; }
  .primary:hover { background: #fff; }
  .ghost { border: 1px solid #2c2c31; color: #a1a1aa; }
  .ghost:hover { border-color: #45454d; color: #ededed; }
</style>
</head>
<body>
<main>
  <div class="code">404</div>
  <h1>No dispatch arm matches this path.</h1>
  <p>The page you asked for doesn’t exist — and Canon requires a catch-all.</p>
  <div class="row">
    <a class="primary" href="/canon/">Home</a>
    <a class="ghost" href="/canon/doc/">Docs</a>
  </div>
</main>
<script>
  // On a custom domain (no /canon/ prefix) fix the button targets.
  (function () {
    if (location.pathname.indexOf("/canon/") !== 0) {
      var links = document.querySelectorAll("a");
      links[0].href = "/";
      links[1].href = "/doc/";
    }
  })();
</script>
</body>
</html>
