name = "Canon"
grammar = "canon"
path_suffixes = ["can"]
language_servers = ["canon-lsp"]
line_comments = []
autoclose_before = ";:.,=}])> \n\t"
brackets = [
  { start = "{", end = "}", close = true, newline = true, indent = true },
  { start = "(", end = ")", close = true, newline = false },
  { start = "<", end = ">", close = false, newline = false },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
]
word_characters = ["_"]
